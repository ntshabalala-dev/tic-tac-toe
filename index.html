<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./dialog.css">
    <script defer src="./tto.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css?family=Roboto:wght@100;400;700&display=swap" rel="stylesheet" />
    <title>Document</title>
</head>

<body>
    <dialog id="my-dialog">
        <div class="dialog-header">
            <h2 id="dialog-header__dialog-title"></h2>
            <button class="close-btn" commandfor="my-dialog" command="close" title="Close">&times;</button>
            <div class="dialog-header__buttons">
                <button type="button" commandfor="my-dialog" command="close" id="continue-button" data-close-modal>
                    Continue
                </button>
                <button type="button" commandfor="my-dialog" command="close" id="restart-button" data-close-modal>
                    Restart
                </button>
            </div>
        </div>
    </dialog>

    <div class="board">
        <div class="board__item board__item--0"></div>
        <div class="board__item board__item--1"></div>
        <div class="board__item board__item--2"></div>
        <div class="board__item board__item--3"></div>
        <div class="board__item board__item--4"></div>
        <div class="board__item board__item--5"></div>
        <div class="board__item board__item--6"></div>
        <div class="board__item board__item--7"></div>
        <div class="board__item board__item--8"></div>
    </div>

    <div class="game-players">
         <span class="turn turn--active"></span>
        <div class="game-players__container">
            <!-- Independent player blocks (reusable) -->
            <div class="player player--1">
                <span class="turn"><span class="arrow">></span>Your Turn</span>
                <div class="card"><span class="card__letter">
                    X
                </span>
                </div>
            </div>
            <!-- Simple score container -->
            <div class="score">
                <span class="score__value score__value--1">0</span>
                <span class="score__vs">VS</span>
                <span class="score__value score__value--2">0</span>
            </div>

            <div class="player player--2">
                <span class="turn turn--inactive"><span class="arrow">></span>Your Turn</span>
                <div class="card">
                    <span class="card__letter">O</span>
                </div>
            </div>
        </div>

    </div>


</body>

</html>
